<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
<title>Rumaliwala | Rumali & Islamic Accessories</title>
<meta name="description" content="Rumaliwala - Rumali, Namazi, Burkha accessories, caps, masks and gloves. Order on WhatsApp. Ahmedabad." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f6f2ea;
    --surface: #fffdf9;
    --surface-2: #f1ebe0;
    --ink: #211f1b;
    --ink-soft: #6b675e;
    --line: #e6dfd1;
    --line-dark: #d8cfbc;
    --accent: #14352c;
    --accent-2: #1d5a49;
    --accent-soft: #e7efe9;
    --gold: #a67c3d;
    --danger: #a83228;
    --radius: 14px;
    --radius-lg: 20px;
    --shadow: 0 2px 10px rgba(33,31,27,.05);
    --shadow-lg: 0 14px 40px rgba(33,31,27,.16);
    --maxw: 1120px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--ink); line-height: 1.5; -webkit-font-smoothing: antialiased; padding-bottom: 88px; }
  h1,h2,h3,h4 { font-weight: 600; letter-spacing: -0.3px; margin: 0; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  img { max-width: 100%; display: block; }
  a { color: inherit; text-decoration: none; }
  svg { display: block; }
  .icon { width: 22px; height: 22px; }
  input, textarea, select { font-family: inherit; }

  header.top { position: sticky; top: 0; z-index: 40; background: rgba(246,242,234,.92); backdrop-filter: saturate(180%) blur(12px); border-bottom: 1px solid var(--line); }
  .top-inner { max-width: var(--maxw); margin: 0 auto; padding: 11px 14px; display: flex; align-items: center; gap: 12px; }
  .brand { display: flex; align-items: center; gap: 10px; cursor: pointer; flex-shrink: 0; }
  .brand .mark { width: 42px; height: 42px; border-radius: 11px; background: var(--accent); color: #fff; display: grid; place-items: center; }
  .brand .mark svg { width: 24px; height: 24px; }
  .brand h1 { font-size: 19px; line-height: 1; }
  .brand p { font-size: 10px; margin: 2px 0 0; color: var(--ink-soft); letter-spacing: .4px; text-transform: uppercase; }
  .search-wrap { flex: 1; position: relative; max-width: 460px; margin-left: auto; }
  .search-wrap input { width: 100%; padding: 11px 14px 11px 42px; border: 1px solid var(--line-dark); border-radius: 30px; background: var(--surface); font-size: 15px; color: var(--ink); outline: none; }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap .si { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--ink-soft); }
  .search-wrap .si svg { width: 19px; height: 19px; }

  main { max-width: var(--maxw); margin: 0 auto; padding: 14px; }

  .section-head { display: flex; align-items: center; gap: 8px; margin: 26px 2px 13px; }
  .section-head svg { width: 20px; height: 20px; color: var(--gold); }
  .section-head h3 { font-size: 19px; }

  .hero { position: relative; border-radius: var(--radius-lg); overflow: hidden; background: var(--accent); color: #f4efe4; padding: 26px 22px; margin-top: 4px; }
  .hero .pattern { position: absolute; inset: 0; opacity: .1; background-repeat: repeat; background-size: 50px 50px; }
  .hero-content { position: relative; }
  .hero h2 { font-size: 27px; line-height: 1.1; margin: 0 0 14px; color: #fbf7ee; }
  .hero-cta { display: inline-flex; align-items: center; gap: 8px; background: #fbf7ee; color: var(--accent); font-weight: 600; padding: 12px 22px; border-radius: 30px; font-size: 15px; }
  .hero-cta svg { width: 18px; height: 18px; }

  .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .cat-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px 6px 12px; text-align: center; transition: transform .12s, box-shadow .12s, border-color .12s; }
  .cat-card:active { transform: scale(.95); }
  .cat-card:hover { box-shadow: var(--shadow); border-color: var(--line-dark); }
  .cat-ic { width: 46px; height: 46px; margin: 0 auto 8px; border-radius: 12px; background: var(--accent-soft); color: var(--accent); display: grid; place-items: center; }
  .cat-ic svg { width: 28px; height: 28px; stroke-width: 1.6; }
  .cat-card .name { font-size: 12.5px; font-weight: 500; line-height: 1.2; }

  .prod-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .prod-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; position: relative; display: flex; flex-direction: column; transition: box-shadow .15s, border-color .15s; }
  .prod-card:hover { box-shadow: var(--shadow); border-color: var(--line-dark); }
  .prod-thumb { aspect-ratio: 1/1; position: relative; cursor: pointer; overflow: hidden; background: var(--surface-2); }
  .prod-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .prod-thumb .ph { position: absolute; inset: 0; display: grid; place-items: center; }
  .prod-thumb .ph svg { width: 44px; height: 44px; stroke-width: 1.3; opacity: .5; }
  .prod-badges { position: absolute; top: 8px; left: 8px; display: flex; flex-direction: column; gap: 4px; z-index: 2; }
  .badge { font-size: 10px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase; padding: 3px 8px; border-radius: 20px; color: #fff; }
  .badge.new { background: var(--accent-2); }
  .badge.best { background: var(--gold); }
  .badge.off { background: var(--danger); }
  .wish-btn { position: absolute; top: 7px; right: 7px; width: 34px; height: 34px; background: rgba(255,253,249,.92); border-radius: 50%; display: grid; place-items: center; color: var(--ink); box-shadow: var(--shadow); z-index: 2; }
  .wish-btn svg { width: 18px; height: 18px; }
  .wish-btn.on { color: var(--danger); }
  .prod-body { padding: 10px 11px 12px; display: flex; flex-direction: column; gap: 3px; flex: 1; }
  .prod-title { font-size: 14.5px; font-weight: 600; line-height: 1.2; cursor: pointer; }
  .prod-meta { font-size: 11.5px; color: var(--ink-soft); }
  .prod-price-row { display: flex; align-items: baseline; gap: 7px; margin-top: 4px; }
  .prod-price { font-size: 18px; font-weight: 700; }
  .prod-mrp { font-size: 12px; color: var(--ink-soft); text-decoration: line-through; }
  .add-btn { margin-top: 10px; border: 1.5px solid var(--accent); color: var(--accent); background: var(--surface); font-weight: 600; font-size: 14px; padding: 10px; border-radius: 10px; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background .12s, color .12s; }
  .add-btn svg { width: 18px; height: 18px; }
  .add-btn:active, .add-btn:hover { background: var(--accent); color: #fff; }
  .add-btn.oos { border-color: var(--line-dark); color: var(--ink-soft); }
  .add-btn.oos:hover { background: var(--surface-2); color: var(--ink-soft); }

  .chips { display: flex; gap: 8px; overflow-x: auto; padding: 4px 0 10px; scrollbar-width: none; }
  .chips::-webkit-scrollbar { display: none; }
  .chip { white-space: nowrap; padding: 9px 15px; border-radius: 30px; border: 1px solid var(--line-dark); background: var(--surface); font-size: 14px; color: var(--ink-soft); transition: all .12s; cursor: pointer; }
  .chip.active, .chip.on { background: var(--accent); color: #fff; border-color: var(--accent); }

  .back-bar { display: flex; align-items: center; gap: 10px; margin: 4px 0 2px; }
  .back-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 15px; font-weight: 500; color: var(--accent-2); padding: 6px 0; }
  .back-btn svg { width: 20px; height: 20px; }
  .page-h { font-size: 23px; font-weight: 600; margin: 6px 2px 2px; }
  .page-sub { font-size: 13px; color: var(--ink-soft); margin: 0 2px 14px; }

  .sub-list { display: flex; flex-direction: column; gap: 10px; }
  .sub-row { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; }
  .sub-row:hover { border-color: var(--accent); }
  .sub-row span.t { font-size: 16px; font-weight: 600; }
  .sub-row svg { width: 20px; height: 20px; color: var(--accent-2); }

  .age-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .age-card { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 18px 8px; text-align: center; font-weight: 700; font-size: 18px; transition: all .12s; }
  .age-card:hover { border-color: var(--accent); color: var(--accent); }
  .age-card small { display: block; font-weight: 400; font-size: 11px; color: var(--ink-soft); margin-top: 2px; }

  .pd-gallery { border-radius: var(--radius-lg); overflow: hidden; background: var(--surface); border: 1px solid var(--line); }
  .pd-main { aspect-ratio: 1/1; position: relative; background: var(--surface-2); }
  .pd-main img { width: 100%; height: 100%; object-fit: cover; }
  .pd-main .ph { position: absolute; inset: 0; display: grid; place-items: center; }
  .pd-main .ph svg { width: 92px; height: 92px; stroke-width: 1.1; opacity: .5; }
  .pd-info h2 { font-size: 24px; margin: 0 0 4px; }
  .pd-specs { margin: 14px 0; border-top: 1px solid var(--line); }
  .pd-specs .row { display: flex; justify-content: space-between; padding: 11px 2px; border-bottom: 1px solid var(--line); font-size: 14px; }
  .pd-specs .row span:first-child { color: var(--ink-soft); }
  .colors { display: flex; gap: 9px; }
  .color-dot { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--line-dark); cursor: pointer; }
  .qty-row { display: flex; align-items: center; gap: 16px; margin: 16px 0; }
  .qty-ctrl { display: flex; align-items: center; border: 1px solid var(--line-dark); border-radius: 12px; overflow: hidden; }
  .qty-ctrl button { width: 46px; height: 46px; display: grid; place-items: center; color: var(--accent); }
  .qty-ctrl button svg { width: 20px; height: 20px; }
  .qty-ctrl span { min-width: 40px; text-align: center; font-weight: 700; font-size: 17px; }

  .btn-primary { background: var(--accent); color: #fff; font-weight: 600; font-size: 16px; padding: 15px; border-radius: 12px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background .12s; }
  .btn-primary svg { width: 20px; height: 20px; }
  .btn-primary:active { background: #0d271f; }
  .btn-primary:disabled { background: #a9b3ad; }
  .btn-wa { background: #1f8f4e; }
  .btn-wa:active { background: #187a41; }
  .btn-danger { background: var(--danger); }
  .btn-outline { background: var(--surface); border: 1px solid var(--line-dark); color: var(--ink); font-weight: 600; font-size: 15px; padding: 13px; border-radius: 12px; width: 100%; display:flex; align-items:center; justify-content:center; gap:8px; }
  .btn-outline svg { width: 18px; height: 18px; }

  .cart-item { display: flex; gap: 12px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 11px; margin-bottom: 11px; }
  .cart-thumb { width: 66px; height: 66px; border-radius: 10px; overflow: hidden; background: var(--surface-2); display: grid; place-items: center; flex-shrink: 0; }
  .cart-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .cart-thumb svg { width: 30px; height: 30px; opacity: .5; }
  .cart-info { flex: 1; min-width: 0; }
  .cart-info h4 { margin: 0 0 2px; font-size: 15px; font-weight: 600; }
  .cart-info .m { font-size: 12px; color: var(--ink-soft); }
  .cart-qc { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
  .cart-qc .qty-ctrl button { width: 34px; height: 34px; }
  .cart-qc .qty-ctrl button svg { width: 17px; height: 17px; }
  .cart-qc .qty-ctrl span { min-width: 30px; font-size: 15px; }
  .cart-remove { color: var(--danger); display: grid; place-items: center; padding: 4px; }
  .cart-remove svg { width: 19px; height: 19px; }
  .cart-line-price { font-weight: 700; font-size: 16px; text-align: right; white-space: nowrap; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 8px 0 4px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field.full { grid-column: 1 / -1; }
  .field label { font-size: 13px; font-weight: 500; color: var(--ink-soft); display: flex; align-items: center; gap: 6px; }
  .field label svg { width: 16px; height: 16px; }
  .field input, .field textarea, .field select { padding: 13px; border: 1px solid var(--line-dark); border-radius: 10px; font-size: 16px; background: var(--surface); color: var(--ink); outline: none; }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
  .field .err { border-color: var(--danger) !important; }

  .summary { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 15px; margin: 15px 0; }
  .summary .row { display: flex; justify-content: space-between; font-size: 14px; padding: 5px 0; }
  .summary .row.total { font-size: 20px; font-weight: 700; border-top: 1px solid var(--line); margin-top: 6px; padding-top: 12px; }

  .empty { text-align: center; padding: 56px 20px; color: var(--ink-soft); }
  .empty svg { width: 54px; height: 54px; margin: 0 auto 14px; opacity: .4; stroke-width: 1.2; }

  .fabs { position: fixed; right: 15px; bottom: 96px; z-index: 45; display: flex; flex-direction: column; gap: 12px; }
  .fab { width: 54px; height: 54px; border-radius: 50%; display: grid; place-items: center; box-shadow: var(--shadow-lg); color: #fff; }
  .fab svg { width: 26px; height: 26px; }
  .fab.wa { background: #1f8f4e; }
  .fab.call { background: var(--accent); }

  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 44; background: var(--surface); border-top: 1px solid var(--line); display: flex; justify-content: space-around; padding: 7px 0 max(7px, env(safe-area-inset-bottom)); }
  .bottom-nav button { display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10.5px; color: var(--ink-soft); flex: 1; position: relative; }
  .bottom-nav button svg { width: 23px; height: 23px; }
  .bottom-nav button.active { color: var(--accent); }
  .nav-badge { position: absolute; top: -3px; right: 50%; margin-right: -22px; background: var(--danger); color: #fff; font-size: 9px; font-weight: 700; min-width: 16px; height: 16px; border-radius: 8px; display: grid; place-items: center; padding: 0 4px; }

  .toast { position: fixed; left: 50%; bottom: 150px; transform: translateX(-50%) translateY(20px); background: var(--ink); color: #fff; padding: 12px 20px; border-radius: 30px; font-size: 14px; font-weight: 500; z-index: 60; opacity: 0; pointer-events: none; transition: all .25s; box-shadow: var(--shadow-lg); max-width: 90vw; text-align: center; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .contact-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 2px; }
  .contact-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 15px 8px; text-align: center; font-size: 12.5px; font-weight: 500; }
  .contact-card svg { width: 26px; height: 26px; margin: 0 auto 7px; color: var(--accent); }
  .site-footer { text-align: center; padding: 30px 16px 12px; color: var(--ink-soft); font-size: 12px; }
  .site-footer button { display: inline-flex; align-items: center; gap: 5px; color: var(--ink-soft); margin-top: 6px; }
  .site-footer button svg { width: 15px; height: 15px; }

  .wholesale-hero { position: relative; overflow: hidden; background: var(--accent); color: #f4efe4; border-radius: var(--radius-lg); padding: 26px 20px; margin-bottom: 18px; }
  .wholesale-hero .pattern { position: absolute; inset: 0; opacity: .1; background-size: 50px 50px; }
  .wholesale-hero h2 { position: relative; margin: 0 0 6px; font-size: 22px; }
  .wholesale-hero p { position: relative; margin: 0; opacity: .85; font-size: 14px; }

  .skel-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; }
  .skel { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); height: 240px; position: relative; overflow: hidden; }
  .skel::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(0,0,0,.03), transparent); transform: translateX(-100%); animation: sh 1.2s infinite; }
  @keyframes sh { 100% { transform: translateX(100%); } }

  /* Admin */
  .admin-wrap { max-width: 760px; margin: 0 auto; }
  .admin-login { max-width: 380px; margin: 40px auto; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 28px 24px; text-align: center; }
  .admin-login .lk { width: 54px; height: 54px; border-radius: 14px; background: var(--accent-soft); color: var(--accent); display: grid; place-items: center; margin: 0 auto 14px; }
  .admin-login .lk svg { width: 28px; height: 28px; }
  .admin-tabs { display: flex; gap: 8px; margin: 6px 0 16px; }
  .admin-tabs button { flex: 1; padding: 11px; border-radius: 10px; border: 1px solid var(--line-dark); background: var(--surface); font-weight: 600; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 7px; color: var(--ink-soft); }
  .admin-tabs button svg { width: 18px; height: 18px; }
  .admin-tabs button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .admin-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px 8px; text-align: center; }
  .stat-card .n { font-size: 26px; font-weight: 700; }
  .stat-card .l { font-size: 11px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .4px; }
  .admin-row { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 10px; margin-bottom: 9px; }
  .admin-row .th { width: 50px; height: 50px; border-radius: 10px; overflow: hidden; background: var(--surface-2); display: grid; place-items: center; flex-shrink: 0; }
  .admin-row .th img { width: 100%; height: 100%; object-fit: cover; }
  .admin-row .th svg { width: 26px; height: 26px; opacity: .5; }
  .admin-row .meta { flex: 1; min-width: 0; }
  .admin-row .meta h4 { margin: 0; font-size: 15px; font-weight: 600; }
  .admin-row .meta p { margin: 2px 0 0; font-size: 12px; color: var(--ink-soft); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .admin-row .acts { display: flex; gap: 6px; }
  .admin-row .acts button { width: 38px; height: 38px; border-radius: 9px; border: 1px solid var(--line-dark); display: grid; place-items: center; color: var(--ink-soft); }
  .admin-row .acts button svg { width: 17px; height: 17px; }
  .admin-row .acts button.del:active { border-color: var(--danger); color: var(--danger); }
  .admin-row.off { opacity: .55; }
  .pill-stat { font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 2px 7px; border-radius: 12px; }
  .pill-stat.live { background: var(--accent-soft); color: var(--accent); }
  .pill-stat.hidden { background: #f0e9db; color: var(--ink-soft); }
  .pill-stat.oos { background: #f6e2df; color: var(--danger); }

  /* Chip fields (admin form) */
  .fld { margin-bottom: 18px; }
  .fld > label { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .fld > label svg { width: 16px; height: 16px; color: var(--ink-soft); }
  .chip-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip-ic { display: inline-flex; align-items: center; gap: 6px; }
  .chip-ic svg { width: 17px; height: 17px; }
  .swatch-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
  .swatch { width: 40px; height: 40px; border-radius: 10px; border: 2px solid var(--line-dark); position: relative; cursor: pointer; }
  .swatch.on { border-color: var(--accent); }
  .swatch.on::after { content: ""; position: absolute; inset: 0; display: block; }
  .swatch .tick { position: absolute; inset: 0; display: grid; place-items: center; color: #fff; }
  .swatch .tick svg { width: 18px; height: 18px; filter: drop-shadow(0 1px 2px rgba(0,0,0,.5)); }
  .icon-pick { display: flex; flex-wrap: wrap; gap: 8px; }
  .icon-pick button { width: 48px; height: 48px; border-radius: 12px; border: 1.5px solid var(--line-dark); display: grid; place-items: center; color: var(--ink); background: var(--surface); }
  .icon-pick button svg { width: 24px; height: 24px; }
  .icon-pick button.on { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
  .photo-tile { width: 100px; height: 100px; border-radius: 14px; border: 2px dashed var(--line-dark); overflow: hidden; background: var(--surface-2); display: grid; place-items: center; color: var(--ink-soft); position: relative; }
  .photo-tile img { width: 100%; height: 100%; object-fit: cover; }
  .photo-tile svg { width: 30px; height: 30px; opacity: .6; }
  .toggle-row { display: flex; gap: 8px; }
  .toggle-row .chip { flex: 1; text-align: center; justify-content: center; display: flex; }
  .cat-manage-row { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 11px 12px; margin-bottom: 9px; }
  .cat-manage-row .ci { width: 42px; height: 42px; border-radius: 10px; background: var(--accent-soft); color: var(--accent); display: grid; place-items: center; }
  .cat-manage-row .ci svg { width: 24px; height: 24px; }

function icon(name, cls){ return `<svg class="${cls||'icon'}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||''}</svg>`; }
function iconFill(name, cls){ return `<svg class="${cls||'icon'}" viewBox="0 0 24 24" fill="currentColor" stroke="none">${ICONS[name]||''}</svg>`; }
function patternURI(stroke){
  const s = stroke.replace('#','%23');
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='44' height='44' viewBox='0 0 44 44'><g fill='none' stroke='${s}' stroke-width='1'><rect x='11' y='11' width='22' height='22'/><rect x='11' y='11' width='22' height='22' transform='rotate(45 22 22)'/></g></svg>`;
  return `url("data:image/svg+xml,${encodeURIComponent(svg)}")`;
}

/* Icon choices for category picker */
const ICON_CHOICES = ["rumali","cap","namazi","nose","burkha","gloves","mask","scarf","ring","shirt","box","heart","bell","moon","pin","tag"];
/* Colour palette for product form */
const PALETTE = [
  {n:"White",h:"#ffffff"},{n:"Black",h:"#1b2631"},{n:"Green",h:"#14352c"},
  {n:"Maroon",h:"#7b241c"},{n:"Navy",h:"#1a5276"},{n:"Gold",h:"#a67c3d"},
  {n:"Purple",h:"#6c3483"},{n:"Grey",h:"#5d6d7e"},{n:"Pink",h:"#f1948a"},
  {n:"Sky",h:"#85c1e9"},{n:"Cream",h:"#f9e79f"},{n:"Brown",h:"#7e5109"},
];

const DEFAULT_CATS = [
  {id:"rumali",name:"Rumali",icon:"rumali"},{id:"nose",name:"Nose Piece",icon:"nose"},
  {id:"burkha",name:"Burkha",icon:"burkha"},{id:"gloves",name:"Gloves",icon:"gloves"},
  {id:"mask",name:"Mask",icon:"mask"},{id:"cap",name:"Cap",icon:"cap"},{id:"namazi",name:"Namazi",icon:"namazi"},
];
const WHOLESALE = { id:"wholesale", name:"Wholesale", icon:"box", special:true };

const AGE_KIDS = ["2 Years","3 Years","4 Years","5 Years","6 Years","7 Years","8 Years","9 Years","10 Years","11 Years","12 Years"];
const AGE_ADULT = ["12+ Years","Adult Free Size"];
const AGE_ALL = ["Baby", ...AGE_KIDS, ...AGE_ADULT];

const SEED = [
  { id:"s1", cat:"rumali", sub:"Diamond Rumali", age:"6 Years", title:"Diamond Net Rumali", price:120, mrp:150, fabric:"Soft Cotton", colors:["#14352c","#7b241c"], badge:"best", stars:5, stock:24, desc:"" },
  { id:"s2", cat:"cap", sub:"Prayer Cap", age:"Adult Free Size", title:"Cotton Prayer Cap", price:60, mrp:80, fabric:"Cotton", colors:["#ffffff","#14352c"], badge:"best", stars:5, stock:50, desc:"" },
];

/* ============ STATE ============ */
const store = {
  products: [], categories: [], loaded: false,
  cart: load("rw_cart", []), wishlist: load("rw_wish", []), recent: load("rw_recent", []),
  view: "home", filterCat: null, filterSub: null, filterAge: null,
  search: "", sort: "featured", _detailId: null,
  admin: { pass: sessionStorage.getItem("rw_pass") || null, tab: "products", form: null, editing: null, catAdding: false, newCat: {name:"", icon:"box"} },
};
function load(k,d){ try { return JSON.parse(localStorage.getItem(k))||d; } catch(e){ return d; } }
function save(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
function persist(){ save("rw_cart",store.cart); save("rw_wish",store.wishlist); save("rw_recent",store.recent); }

/* ============ SUPABASE ============ */
async function sbGet(path){ const r = await fetch(`${SB.url}/rest/v1/${path}`, { headers:{ apikey:SB.key, Authorization:"Bearer "+SB.key } }); if(!r.ok) throw new Error("fetch failed"); return r.json(); }
async function sbRpc(fn, body){
  const r = await fetch(`${SB.url}/rest/v1/rpc/${fn}`, { method:"POST", headers:{ apikey:SB.key, Authorization:"Bearer "+SB.key, "Content-Type":"application/json" }, body: JSON.stringify(body) });
  const text = await r.text(); if(!r.ok) throw new Error(text || "request failed");
  try { return JSON.parse(text); } catch(e){ return text; }
}
function normalize(rows){ return rows.map(r=>({ id:r.id, cat:r.category, sub:r.subcategory||"", age:r.age||"", title:r.title, price:Number(r.price), mrp:Number(r.mrp)||0, fabric:r.fabric||"", colors:r.colors||[], image:r.image_url||"", badge:r.badge||"", stars:r.rating||5, stock:r.stock||0, featured:r.featured, active:r.active, desc:r.description||"", sort_order:r.sort_order||0 })); }
async function loadData(){
  try {
    const [prods, cats] = await Promise.all([ sbGet("rw_products?select=*&order=sort_order.asc,created_at.asc"), sbGet("rw_categories?select=*&order=sort_order.asc") ]);
    store.products = normalize(prods);
    store.categories = (cats||[]).filter(c=>c.active!==false);
    if (!store.categories.length) store.categories = DEFAULT_CATS.slice();
    store.loaded = true;
  } catch(e){
    store.products = SEED.map(s=>({ ...s, active:true, image:"", featured:s.badge==='best' }));
    store.categories = DEFAULT_CATS.slice();
    store.loaded = true;
    toast("Offline - showing samples");
  }
}
async function reloadProducts(){ try { store.products = normalize(await sbGet("rw_products?select=*&order=sort_order.asc,created_at.asc")); } catch(e){} }
async function reloadCategories(){ try { const c = await sbGet("rw_categories?select=*&order=sort_order.asc"); store.categories = (c||[]).filter(x=>x.active!==false); } catch(e){} }

function shopProducts(){ return store.products.filter(p=>p.active); }
const catOf = id => store.categories.find(c=>c.id===id) || (id==='wholesale'?WHOLESALE:null);
const catIcon = id => (catOf(id)||{}).icon || "box";
const catName = id => (catOf(id)||{}).name || id;
function homeCats(){ return [...store.categories, WHOLESALE]; }

/* ============ HELPERS ============ */
const money = n => CONFIG.currency + Number(n||0).toLocaleString('en-IN');
const byId = id => store.products.find(p=>p.id===id);
function stars(n){ return "★".repeat(n) + "☆".repeat(5-n); }
function subsFor(cat){ return [...new Set(shopProducts().filter(p=>p.cat===cat && p.sub).map(p=>p.sub))]; }
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2000); }
function escapeHtml(s){ return String(s==null?"":s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function thumbHTML(p){
  if (p.image) return `<img src="${escapeHtml(p.image)}" alt="${escapeHtml(p.title)}" loading="lazy" onerror="this.style.display='none'"/>`;
  const c = (p.colors && p.colors[0]) || "#14352c";
  return `<div class="ph" style="background-color:${c}0f; background-image:${patternURI(c)}; background-position:center; color:${c}">${icon(catIcon(p.cat),'')}</div>`;
}

/* ============ CART / WISHLIST ============ */
function cartCount(){ return store.cart.reduce((s,i)=>s+i.qty,0); }
function cartTotal(){ return store.cart.reduce((s,i)=>{ const p=byId(i.id); return s+(p?p.price*i.qty:0); },0); }
function addToCart(id, qty=1){ const p=byId(id); if(!p||p.stock<=0){ toast("Out of stock"); return; } const ex=store.cart.find(i=>i.id===id); if(ex)ex.qty+=qty; else store.cart.push({id,qty}); persist(); updateBadges(); toast("Added to cart"); }
function setQty(id, qty){ const it=store.cart.find(i=>i.id===id); if(!it)return; it.qty=qty; if(it.qty<=0) store.cart=store.cart.filter(i=>i.id!==id); persist(); updateBadges(); render(); }
function removeFromCart(id){ store.cart=store.cart.filter(i=>i.id!==id); persist(); updateBadges(); render(); }
function toggleWish(id){ if(store.wishlist.includes(id)) store.wishlist=store.wishlist.filter(x=>x!==id); else store.wishlist.push(id); persist(); render(); }
const isWished = id => store.wishlist.includes(id);
function trackRecent(id){ store.recent=[id,...store.recent.filter(x=>x!==id)].slice(0,8); persist(); }

/* ============ NAV ============ */
function go(view, opts={}){
  store.view=view;
  if(opts.cat!==undefined) store.filterCat=opts.cat;
  if(opts.sub!==undefined) store.filterSub=opts.sub;
  if(opts.age!==undefined) store.filterAge=opts.age;
  if(view==="home"){ store.filterCat=store.filterSub=store.filterAge=null; store.search=""; const si=document.getElementById("searchInput"); if(si) si.value=""; }
  if(view!=="admin" && location.hash==="#admin") history.replaceState(null,"",location.pathname);
  window.scrollTo(0,0); render();
}
function onSearch(v){ store.search=v.trim().toLowerCase(); if(store.search && store.view!=="search") store.view="search"; if(!store.search && store.view==="search") store.view="home"; render(); }
function matchesSearch(p){ if(!store.search) return true; return [p.title,p.cat,p.sub,p.age,p.fabric,catName(p.cat),(p.colors||[]).join(" ")].join(" ").toLowerCase().includes(store.search); }

/* ============ RENDER ============ */
const app = document.getElementById("app");
function render(){
  updateBadges();
  let html="";
  switch(store.view){
    case "home": html=viewHome(); break;
    case "categories": html=viewCategories(); break;
    case "category": html=viewCategory(); break;
    case "age": html=viewAge(); break;
    case "products": html=viewProducts(); break;
    case "detail": html=viewDetail(); break;
    case "cart": html=viewCart(); break;
    case "wishlist": html=viewWishlist(); break;
    case "search": html=viewSearch(); break;
    case "wholesale": html=viewWholesale(); break;
    case "admin": html=viewAdmin(); break;
    default: html=viewHome();
  }
  app.innerHTML=html;
}

function productCard(p){
  const oos=p.stock<=0, off=p.mrp>p.price?Math.round((1-p.price/p.mrp)*100):0;
  return `<div class="prod-card">
    <div class="prod-thumb" onclick="openDetail('${p.id}')">${thumbHTML(p)}
      <div class="prod-badges">
        ${p.badge==='new'?'<span class="badge new">New</span>':''}
        ${p.badge==='best'?'<span class="badge best">Top</span>':''}
        ${off?`<span class="badge off">-${off}%</span>`:''}
      </div>
      <button class="wish-btn ${isWished(p.id)?'on':''}" onclick="event.stopPropagation();toggleWish('${p.id}')">${isWished(p.id)?iconFill('heart'):icon('heart')}</button>
    </div>
    <div class="prod-body">
      <div class="prod-title" onclick="openDetail('${p.id}')">${escapeHtml(p.title)}</div>
      ${p.age?`<div class="prod-meta">${p.age}</div>`:''}
      <div class="prod-price-row"><span class="prod-price">${money(p.price)}</span>${p.mrp>p.price?`<span class="prod-mrp">${money(p.mrp)}</span>`:''}</div>
      ${oos?`<button class="add-btn oos" onclick="notifyMe('${p.id}')">${icon('bell')} Notify</button>`:`<button class="add-btn" onclick="addToCart('${p.id}')">${icon('plus')} Add</button>`}
    </div>
  </div>`;
}
function catCard(c){
  return `<div class="cat-card" onclick="${c.special?"go('wholesale')":`openCategory('${c.id}')`}">
    <div class="cat-ic">${icon(c.icon)}</div>
    <div class="name">${escapeHtml(c.name)}</div>
  </div>`;
}
function skeleton(){ return `<div class="hero" style="min-height:150px"></div><div class="section-head"><h3>Loading...</h3></div><div class="skel-grid">${Array(4).fill('<div class="skel"></div>').join("")}</div>`; }

/* ---------- HOME ---------- */
function viewHome(){
  if(!store.loaded) return skeleton();
  const list=shopProducts();
  const best=list.filter(p=>p.badge==='best').slice(0,4);
  const fresh=list.filter(p=>p.badge==='new').slice(0,4);
  const recent=store.recent.map(byId).filter(p=>p&&p.active).slice(0,4);
  return `
    <div class="hero"><div class="pattern" style="background-image:${patternURI('#f4efe4')}"></div>
      <div class="hero-content">
        <h2>Rumali, Namazi &amp; more</h2>
        <a class="hero-cta" onclick="go('categories')">Shop now ${icon('arrow')}</a>
      </div></div>
    <div class="section-head"><h3>Categories</h3></div>

function placeOrder(){
  const g=id=>(document.getElementById(id)||{}).value||"";
  const name=g("f_name").trim(), phone=g("f_phone").trim(), addr=g("f_addr").trim(), city=g("f_city").trim(), pin=g("f_pin").trim();
  let ok=true;
  [["f_name",name],["f_phone",phone],["f_addr",addr]].forEach(([id,v])=>{ const el=document.getElementById(id); if(!v){el.classList.add("err");ok=false;} else el.classList.remove("err"); });
  if(!ok){ toast("Fill name, mobile, address"); return; }
  if(!/^\d{10}$/.test(phone.replace(/\D/g,'').slice(-10))){ document.getElementById("f_phone").classList.add("err"); toast("Enter 10-digit mobile"); return; }
  const total=cartTotal();
  let msg=`Assalamualaikum.\nI would like to place an order.\n\nName: ${name}\nMobile: ${phone}\n\nProducts\n`;
  store.cart.forEach((it,i)=>{ const p=byId(it.id); if(!p)return; msg+=`${i+1}. ${p.title}\n`; if(p.age) msg+=`   Size: ${p.age}\n`; msg+=`   Qty: ${it.qty} x ${money(p.price)} = ${money(p.price*it.qty)}\n`; });
  msg+=`\nTotal: ${money(total)}\n\nAddress\n${addr}\n${city}${pin?` - ${pin}`:''}\n\nPlease confirm. Thank you.`;
  window.open(`https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(msg)}`,"_blank");
  toast("Opening WhatsApp...");
}

  const previewP={ ...f, price:+f.price||0, mrp:+f.mrp||0, stars:5, stock:+f.stock||0, image:f.image };
  return `<div class="admin-wrap">
    <div class="back-bar" style="justify-content:space-between"><a class="back-btn" onclick="openAdmin()">${icon('back')} Admin</a>
      <button class="back-btn" onclick="openAdmin()">${icon('x')} Close</button></div>
    <div class="page-h">${isNew?'Add Product':'Edit Product'}</div>

    <div class="fld"><label>${icon('image')} Photo (optional)</label>
      <div style="display:flex;gap:12px;align-items:center">
        <div class="photo-tile">${f.image?`<img src="${escapeHtml(f.image)}" onerror="this.style.display='none'"/>`:icon('image')}</div>
        <input style="flex:1;padding:13px;border:1px solid var(--line-dark);border-radius:10px;font-size:15px" value="${escapeHtml(f.image)}" oninput="afInput('image',this.value)" onchange="render()" placeholder="Paste image link"/>
      </div></div>

    <div class="fld"><label>${icon('tag')} Product name</label>
      <input style="width:100%;padding:14px;border:1px solid var(--line-dark);border-radius:10px;font-size:17px;font-weight:600" value="${escapeHtml(f.title)}" oninput="afInput('title',this.value)" onchange="render()" placeholder="e.g. Diamond Net Rumali"/></div>

    <div class="fld"><label>${icon('layers')} Category</label>
      <div class="chip-wrap">${store.categories.map(c=>`<button class="chip chip-ic ${f.cat===c.id?'on':''}" onclick="afSet('cat','${c.id}')">${icon(c.icon)} ${escapeHtml(c.name)}</button>`).join("")}</div></div>

    <div class="fld"><label>${icon('box')} Type (optional)</label>
      <input list="subsug" style="width:100%;padding:13px;border:1px solid var(--line-dark);border-radius:10px;font-size:16px" value="${escapeHtml(f.sub)}" oninput="afInput('sub',this.value)" onchange="render()" placeholder="e.g. Diamond Rumali"/>
      <datalist id="subsug">${subSuggest.map(s=>`<option value="${escapeHtml(s)}">`).join("")}</datalist></div>

    <div class="fld"><label>${icon('rumali')} Size / Age (optional)</label>
      <div class="chip-wrap">${AGE_ALL.map(a=>`<button class="chip ${f.age===a?'on':''}" onclick="afSet('age', ${JSON.stringify(f.age===a?'':a)})">${a.replace(' Years','')}</button>`).join("")}</div></div>

    <div class="fld"><label>${icon('spark')} Colours</label>
      <div class="swatch-wrap">${PALETTE.map(c=>`<div class="swatch ${f.colors.includes(c.h)?'on':''}" style="background:${c.h}" title="${c.n}" onclick="afToggleColor('${c.h}')">${f.colors.includes(c.h)?`<span class="tick">${icon('check')}</span>`:''}</div>`).join("")}</div></div>

    <div class="fld"><label>${icon('star')} Badge</label>
      <div class="toggle-row">
        <button class="chip ${f.badge===''?'on':''}" onclick="afSet('badge','')">None</button>
        <button class="chip ${f.badge==='new'?'on':''}" onclick="afSet('badge','new')">New</button>
        <button class="chip ${f.badge==='best'?'on':''}" onclick="afSet('badge','best')">Top</button>
      </div></div>

    <div class="form-grid">
      <div class="field"><label>${icon('rupee')} Price</label><input inputmode="numeric" value="${escapeHtml(f.price)}" oninput="afInput('price',this.value)" onchange="render()" placeholder="120"/></div>
      <div class="field"><label>MRP</label><input inputmode="numeric" value="${escapeHtml(f.mrp)}" oninput="afInput('mrp',this.value)" onchange="render()" placeholder="150"/></div>
      <div class="field"><label>${icon('box')} Stock</label><input inputmode="numeric" value="${escapeHtml(f.stock)}" oninput="afInput('stock',this.value)" onchange="render()" placeholder="10"/></div>
      <div class="field"><label>Fabric</label><input value="${escapeHtml(f.fabric)}" oninput="afInput('fabric',this.value)" placeholder="Cotton"/></div>
    </div>

    <div class="fld" style="margin-top:6px"><label>Description (optional)</label>
      <textarea style="width:100%;padding:13px;border:1px solid var(--line-dark);border-radius:10px;font-size:15px;min-height:70px" oninput="afInput('desc',this.value)" placeholder="Short details">${escapeHtml(f.desc)}</textarea></div>

    <div class="fld"><label>${icon('eye')} Show in store</label>
      <div class="toggle-row">
        <button class="chip ${f.active?'on':''}" onclick="afSet('active',true)">${icon('check')} Show</button>
        <button class="chip ${!f.active?'on':''}" onclick="afSet('active',false)">${icon('eyeoff')} Hide</button>
      </div></div>

    <div class="fld"><label>Preview</label><div class="prod-grid" style="grid-template-columns:1fr"><div style="max-width:180px">${productCardPreview(previewP)}</div></div></div>

    <button class="btn-primary" id="a_save" onclick="adminSaveProduct()">${icon('check')} ${isNew?'Add Product':'Save Changes'}</button>
    <div style="height:10px"></div>
    ${!isNew?`<button class="btn-primary btn-danger" onclick='adminDeleteProduct("${f.id}",${JSON.stringify(f.title)})'>${icon('trash')} Delete</button><div style="height:10px"></div>`:''}
    <button class="btn-outline" onclick="openAdmin()">Cancel</button>
    <div style="height:30px"></div></div>`;
}
function productCardPreview(p){
  const off=p.mrp>p.price?Math.round((1-p.price/p.mrp)*100):0;
  return `<div class="prod-card"><div class="prod-thumb">${thumbHTML(p)}<div class="prod-badges">
    ${p.badge==='new'?'<span class="badge new">New</span>':''}${p.badge==='best'?'<span class="badge best">Top</span>':''}${off?`<span class="badge off">-${off}%</span>`:''}</div></div>
    <div class="prod-body"><div class="prod-title">${escapeHtml(p.title||'Product name')}</div>${p.age?`<div class="prod-meta">${p.age}</div>`:''}
    <div class="prod-price-row"><span class="prod-price">${money(p.price)}</span>${p.mrp>p.price?`<span class="prod-mrp">${money(p.mrp)}</span>`:''}</div></div></div>`;
}
async function adminSaveProduct(){
  const f=store.admin.form;
  if(!f.title.trim()){ toast("Enter product name"); return; }
  if(f.price===""||isNaN(+f.price)){ toast("Enter a price"); return; }
  const data={ category:f.cat, subcategory:(f.sub||"").trim(), age:f.age||"", title:f.title.trim(), description:(f.desc||"").trim(), price:+f.price, mrp:+(f.mrp||0), fabric:(f.fabric||"").trim(), colors:f.colors, image_url:(f.image||"").trim(), badge:f.badge||"", stock:+(f.stock||0), active:!!f.active };
  const btn=document.getElementById("a_save"); if(btn){ btn.disabled=true; btn.textContent="Saving..."; }
  try{
    if(store.admin.editing) await sbRpc("rw_update_product",{ p_passcode:store.admin.pass, p_id:store.admin.editing, p:data });
    else await sbRpc("rw_add_product",{ p_passcode:store.admin.pass, p:data });
    await reloadProducts(); store.admin.form=null; toast(store.admin.editing?"Saved":"Product added"); render();
  }catch(e){ if(btn){btn.disabled=false;} toast(adminErr(e)); adminMaybeLogout(e); }
}
async function adminDeleteProduct(id, title){
  if(!confirm(`Delete "${title}"?`)) return;
  try{ await sbRpc("rw_delete_product",{ p_passcode:store.admin.pass, p_id:id }); await reloadProducts(); store.admin.form=null; toast("Deleted"); render(); }
  catch(e){ toast(adminErr(e)); adminMaybeLogout(e); }
}

/* ============ CHROME / INIT ============ */
function updateBadges(){
  const c=cartCount(); const nb=document.getElementById("navCartBadge");
  if(nb){ nb.style.display=c?'grid':'none'; nb.textContent=c; }
  ["Home","Cats","Wish","Cart"].forEach(n=>{ const el=document.getElementById("nav"+n); if(el)el.classList.remove("active"); });
  const map={home:"Home",categories:"Cats",wishlist:"Wish",cart:"Cart"}; const a=map[store.view]; if(a){ const el=document.getElementById("nav"+a); if(el)el.classList.add("active"); }
}
function paintChrome(){
  document.getElementById("brandMark").innerHTML=icon('moon');
  document.getElementById("searchIcon").innerHTML=icon('search');
  document.querySelectorAll(".bottom-nav button[data-ic]").forEach(b=>{ b.insertAdjacentHTML("afterbegin", icon(b.dataset.ic)); });
  const wa=document.getElementById("fabWa"); wa.innerHTML=icon('whatsapp'); wa.href=`https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent('Assalamualaikum')}`; wa.target="_blank";
  const call=document.getElementById("fabCall"); call.innerHTML=icon('phone'); call.href=`tel:+${CONFIG.callNumber}`;
}
async function init(){ paintChrome(); if(location.hash==="#admin") store.view="admin"; render(); await loadData(); render(); }
init();
</script>
</body>
</html>
