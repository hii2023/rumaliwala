<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
<title>Rumaliwala | Premium Rumali & Islamic Accessories</title>
<meta name="description" content="Rumaliwala - Premium Rumali, Namazi, Burkha accessories, caps, masks and gloves. Order easily on WhatsApp. Retail and wholesale in Ahmedabad." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f6f2ea;
    --surface: #fffdf9;
    --surface-2: #f1ebe0;
    --ink: #211f1b;
    --ink-soft: #6b675e;
    --line: #e6dfd1;
    --line-dark: #d8cfbc;
    --accent: #14352c;
    --accent-2: #1d5a49;
    --accent-soft: #e7efe9;
    --gold: #a67c3d;
    --danger: #a83228;
    --radius: 14px;
    --radius-lg: 20px;
    --shadow: 0 2px 10px rgba(33, 31, 27, 0.05);
    --shadow-lg: 0 14px 40px rgba(33, 31, 27, 0.14);
    --maxw: 1120px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    background: var(--bg); color: var(--ink);
    line-height: 1.5; -webkit-font-smoothing: antialiased; padding-bottom: 88px;
  }
  h1,h2,h3,h4,.serif { font-family: 'Fraunces', Georgia, serif; font-weight: 500; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  img { max-width: 100%; display: block; }
  a { color: inherit; text-decoration: none; }
  svg { display: block; }
  .icon { width: 22px; height: 22px; }

  /* Header */
  header.top { position: sticky; top: 0; z-index: 40; background: rgba(246,242,234,.9); backdrop-filter: saturate(180%) blur(12px); border-bottom: 1px solid var(--line); }
  .top-inner { max-width: var(--maxw); margin: 0 auto; padding: 11px 16px; display: flex; align-items: center; gap: 14px; }
  .brand { display: flex; align-items: center; gap: 11px; cursor: pointer; flex-shrink: 0; }
  .brand .mark { width: 42px; height: 42px; border-radius: 11px; background: var(--accent); color: #fff; display: grid; place-items: center; }
  .brand .mark svg { width: 24px; height: 24px; }
  .brand h1 { font-size: 20px; margin: 0; letter-spacing: -0.2px; line-height: 1; }
  .brand p { font-size: 10.5px; margin: 2px 0 0; color: var(--ink-soft); letter-spacing: .5px; text-transform: uppercase; }
  .brand .tag { display: block; }
  .search-wrap { flex: 1; position: relative; max-width: 460px; margin-left: auto; }
  .search-wrap input { width: 100%; padding: 11px 14px 11px 42px; border: 1px solid var(--line-dark); border-radius: 30px; background: var(--surface); font-size: 14px; color: var(--ink); outline: none; transition: border-color .15s; }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap .si { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--ink-soft); }
  .search-wrap .si svg { width: 19px; height: 19px; }

  main { max-width: var(--maxw); margin: 0 auto; padding: 16px; }

  .section-head { display: flex; align-items: baseline; justify-content: space-between; margin: 30px 2px 15px; }
  .section-head h3 { font-size: 21px; margin: 0; letter-spacing: -0.3px; }
  .section-head a { font-size: 13px; color: var(--accent-2); font-weight: 600; }

  /* Hero */
  .hero { position: relative; border-radius: var(--radius-lg); overflow: hidden; background: var(--accent); color: #f4efe4; padding: 40px 26px 34px; margin-top: 6px; }
  .hero .pattern { position: absolute; inset: 0; opacity: .10; background-repeat: repeat; background-size: 52px 52px; }
  .hero-content { position: relative; max-width: 30ch; }
  .hero .eyebrow { font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--gold); margin: 0 0 14px; font-weight: 600; }
  .hero h2 { font-size: 34px; line-height: 1.08; margin: 0 0 12px; letter-spacing: -0.5px; color: #fbf7ee; font-weight: 500; }
  .hero p { margin: 0 0 22px; opacity: .82; font-size: 14.5px; }
  .hero-cta { display: inline-flex; align-items: center; gap: 8px; background: #fbf7ee; color: var(--accent); font-weight: 600; padding: 12px 22px; border-radius: 30px; font-size: 14px; }
  .hero-cta svg { width: 17px; height: 17px; }

  /* Category grid */
  .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 11px; }
  .cat-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px 8px 13px; text-align: center; transition: transform .12s, box-shadow .12s, border-color .12s; }
  .cat-card:active { transform: scale(.96); }
  .cat-card:hover { box-shadow: var(--shadow); border-color: var(--line-dark); }
  .cat-ic { width: 40px; height: 40px; margin: 0 auto 9px; color: var(--accent); display: grid; place-items: center; }
  .cat-ic svg { width: 30px; height: 30px; stroke-width: 1.5; }
  .cat-card .name { font-size: 12.5px; font-weight: 500; line-height: 1.25; }

  /* Product grid */
  .prod-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .prod-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; position: relative; display: flex; flex-direction: column; transition: box-shadow .15s, border-color .15s; }
  .prod-card:hover { box-shadow: var(--shadow); border-color: var(--line-dark); }
  .prod-thumb { aspect-ratio: 1/1; position: relative; cursor: pointer; overflow: hidden; background: var(--surface-2); }
  .prod-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .prod-thumb .ph { position: absolute; inset: 0; display: grid; place-items: center; }
  .prod-thumb .ph svg { width: 46px; height: 46px; stroke-width: 1.3; opacity: .55; }
  .prod-badges { position: absolute; top: 9px; left: 9px; display: flex; flex-direction: column; gap: 5px; z-index: 2; }
  .badge { font-size: 9.5px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; padding: 3px 8px; border-radius: 20px; color: #fff; }
  .badge.new { background: var(--accent-2); }
  .badge.best { background: var(--gold); }
  .badge.off { background: var(--danger); }
  .wish-btn { position: absolute; top: 8px; right: 8px; width: 33px; height: 33px; background: rgba(255,253,249,.92); border-radius: 50%; display: grid; place-items: center; color: var(--ink); box-shadow: var(--shadow); z-index: 2; }
  .wish-btn svg { width: 17px; height: 17px; }
  .wish-btn.on { color: var(--danger); }
  .prod-body { padding: 12px 13px 14px; display: flex; flex-direction: column; gap: 3px; flex: 1; }
  .prod-cat { font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--ink-soft); }
  .prod-title { font-family: 'Fraunces', serif; font-size: 15.5px; font-weight: 500; line-height: 1.2; cursor: pointer; letter-spacing: -0.1px; }
  .prod-meta { font-size: 11.5px; color: var(--ink-soft); }
  .prod-stars { font-size: 11px; color: var(--gold); letter-spacing: 1px; }
  .prod-price-row { display: flex; align-items: baseline; gap: 7px; margin-top: 5px; }
  .prod-price { font-size: 16.5px; font-weight: 700; }
  .prod-mrp { font-size: 12px; color: var(--ink-soft); text-decoration: line-through; }
  .add-btn { margin-top: 11px; border: 1px solid var(--accent); color: var(--accent); background: var(--surface); font-weight: 600; font-size: 13px; padding: 9px; border-radius: 9px; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background .12s, color .12s; }
  .add-btn svg { width: 16px; height: 16px; }
  .add-btn:active, .add-btn:hover { background: var(--accent); color: #fff; }
  .add-btn.oos { border-color: var(--line-dark); color: var(--ink-soft); }
  .add-btn.oos:hover { background: var(--surface-2); color: var(--ink-soft); }

  /* Chips */
  .chips { display: flex; gap: 8px; overflow-x: auto; padding: 4px 0 10px; scrollbar-width: none; }
  .chips::-webkit-scrollbar { display: none; }
  .chip { white-space: nowrap; padding: 8px 15px; border-radius: 30px; border: 1px solid var(--line-dark); background: var(--surface); font-size: 13px; color: var(--ink-soft); transition: all .12s; }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Back / page head */
  .back-bar { display: flex; align-items: center; gap: 10px; margin: 6px 0 2px; }
  .back-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 14px; font-weight: 500; color: var(--accent-2); padding: 6px 0; }
  .back-btn svg { width: 18px; height: 18px; }
  .page-h { font-size: 26px; font-weight: 500; letter-spacing: -0.4px; margin: 6px 2px 2px; }
  .page-sub { font-size: 13px; color: var(--ink-soft); margin: 0 2px 16px; }

  /* Sub-type list */
  .sub-list { display: flex; flex-direction: column; gap: 10px; }
  .sub-row { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; transition: border-color .12s; }
  .sub-row:hover { border-color: var(--accent); }
  .sub-row span.t { font-size: 15px; font-weight: 600; }
  .sub-row svg { width: 18px; height: 18px; color: var(--accent-2); }

  /* Age grid */
  .age-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .age-card { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 16px 8px; text-align: center; font-weight: 600; font-size: 15px; transition: all .12s; }
  .age-card:hover { border-color: var(--accent); color: var(--accent); }
  .age-card small { display: block; font-weight: 400; font-size: 11px; color: var(--ink-soft); margin-top: 2px; }

  /* Product detail */
  .pd-gallery { border-radius: var(--radius-lg); overflow: hidden; background: var(--surface); border: 1px solid var(--line); }
  .pd-main { aspect-ratio: 1/1; position: relative; background: var(--surface-2); }
  .pd-main img { width: 100%; height: 100%; object-fit: cover; }
  .pd-main .ph { position: absolute; inset: 0; display: grid; place-items: center; }
  .pd-main .ph svg { width: 96px; height: 96px; stroke-width: 1.1; opacity: .5; }
  .pd-info h2 { font-size: 27px; margin: 0 0 4px; letter-spacing: -0.4px; font-weight: 500; }
  .pd-cat { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-soft); }
  .pd-specs { margin: 16px 0; border-top: 1px solid var(--line); }
  .pd-specs .row { display: flex; justify-content: space-between; padding: 11px 2px; border-bottom: 1px solid var(--line); font-size: 14px; }
  .pd-specs .row span:first-child { color: var(--ink-soft); }
  .colors { display: flex; gap: 9px; }
  .color-dot { width: 27px; height: 27px; border-radius: 50%; border: 2px solid var(--line-dark); cursor: pointer; }
  .qty-row { display: flex; align-items: center; gap: 16px; margin: 18px 0; }
  .qty-ctrl { display: flex; align-items: center; border: 1px solid var(--line-dark); border-radius: 11px; overflow: hidden; }
  .qty-ctrl button { width: 42px; height: 42px; font-size: 20px; color: var(--accent); }
  .qty-ctrl span { width: 44px; text-align: center; font-weight: 600; }

  /* Buttons */
  .btn-primary { background: var(--accent); color: #fff; font-weight: 600; font-size: 15px; padding: 14px; border-radius: 12px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background .12s; }
  .btn-primary svg { width: 19px; height: 19px; }
  .btn-primary:active { background: #0d271f; }
  .btn-primary:disabled { background: #a9b3ad; }
  .btn-wa { background: #1f8f4e; }
  .btn-wa:active { background: #187a41; }
  .btn-outline { background: var(--surface); border: 1px solid var(--line-dark); color: var(--ink); font-weight: 600; font-size: 15px; padding: 13px; border-radius: 12px; width: 100%; display:flex; align-items:center; justify-content:center; gap:8px; }
  .btn-outline svg { width: 18px; height: 18px; }
  .btn-sm { padding: 8px 12px; font-size: 13px; border-radius: 9px; width: auto; }

  /* Cart */
  .cart-item { display: flex; gap: 12px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 12px; margin-bottom: 12px; }
  .cart-thumb { width: 64px; height: 64px; border-radius: 10px; overflow: hidden; background: var(--surface-2); display: grid; place-items: center; flex-shrink: 0; }
  .cart-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .cart-thumb svg { width: 30px; height: 30px; opacity: .5; }
  .cart-info { flex: 1; min-width: 0; }
  .cart-info h4 { margin: 0 0 2px; font-size: 15px; font-weight: 500; }
  .cart-info .m { font-size: 12px; color: var(--ink-soft); }
  .cart-qc { display: flex; align-items: center; gap: 12px; margin-top: 9px; }
  .cart-qc .qty-ctrl button { width: 30px; height: 30px; font-size: 17px; }
  .cart-qc .qty-ctrl span { width: 32px; }
  .cart-remove { font-size: 12.5px; color: var(--danger); font-weight: 500; }
  .cart-line-price { font-weight: 700; font-size: 15px; text-align: right; white-space: nowrap; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 8px 0 4px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field.full { grid-column: 1 / -1; }
  .field label { font-size: 12.5px; font-weight: 500; color: var(--ink-soft); }
  .field input, .field textarea, .field select { padding: 12px; border: 1px solid var(--line-dark); border-radius: 10px; font-size: 14px; font-family: inherit; background: var(--surface); color: var(--ink); outline: none; }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
  .field .err { border-color: var(--danger) !important; }
  .field .cb { flex-direction: row; align-items: center; gap: 8px; }

  .summary { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; margin: 16px 0; }
  .summary .row { display: flex; justify-content: space-between; font-size: 14px; padding: 5px 0; }
  .summary .row.total { font-size: 19px; font-weight: 700; border-top: 1px solid var(--line); margin-top: 6px; padding-top: 12px; font-family: 'Fraunces', serif; }

  .empty { text-align: center; padding: 60px 20px; color: var(--ink-soft); }
  .empty svg { width: 54px; height: 54px; margin: 0 auto 14px; opacity: .4; stroke-width: 1.2; }

  /* Floating buttons */
  .fabs { position: fixed; right: 16px; bottom: 96px; z-index: 45; display: flex; flex-direction: column; gap: 12px; }
  .fab { width: 52px; height: 52px; border-radius: 50%; display: grid; place-items: center; box-shadow: var(--shadow-lg); color: #fff; position: relative; }
  .fab svg { width: 25px; height: 25px; }
  .fab.wa { background: #1f8f4e; }
  .fab.call { background: var(--accent); }

  /* Bottom nav */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 44; background: var(--surface); border-top: 1px solid var(--line); display: flex; justify-content: space-around; padding: 7px 0 max(7px, env(safe-area-inset-bottom)); }
  .bottom-nav button { display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10.5px; color: var(--ink-soft); flex: 1; position: relative; }
  .bottom-nav button svg { width: 22px; height: 22px; }
  .bottom-nav button.active { color: var(--accent); }
  .nav-badge { position: absolute; top: -3px; right: 50%; margin-right: -22px; background: var(--danger); color: #fff; font-size: 9px; font-weight: 700; min-width: 16px; height: 16px; border-radius: 8px; display: grid; place-items: center; padding: 0 4px; }

  /* Toast */
  .toast { position: fixed; left: 50%; bottom: 150px; transform: translateX(-50%) translateY(20px); background: var(--ink); color: #fff; padding: 11px 18px; border-radius: 30px; font-size: 13.5px; font-weight: 500; z-index: 60; opacity: 0; pointer-events: none; transition: all .25s; box-shadow: var(--shadow-lg); max-width: 90vw; text-align: center; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Contact */
  .contact-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 4px; }
  .contact-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px 8px; text-align: center; font-size: 12.5px; font-weight: 500; }
  .contact-card svg { width: 24px; height: 24px; margin: 0 auto 7px; color: var(--accent); }
  .site-footer { text-align: center; padding: 34px 16px 12px; color: var(--ink-soft); font-size: 12px; line-height: 1.7; }
  .site-footer a { color: var(--ink-soft); border-bottom: 1px solid var(--line-dark); }

  /* Wholesale */
  .wholesale-hero { position: relative; overflow: hidden; background: var(--accent); color: #f4efe4; border-radius: var(--radius-lg); padding: 30px 22px; margin-bottom: 20px; }
  .wholesale-hero .pattern { position: absolute; inset: 0; opacity: .1; background-size: 52px 52px; }
  .wholesale-hero h2 { position: relative; margin: 0 0 6px; font-size: 24px; font-weight: 500; }
  .wholesale-hero p { position: relative; margin: 0; opacity: .85; font-size: 14px; }

  /* Loading skeleton */
  .skel-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; }
  .skel { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); height: 250px; position: relative; overflow: hidden; }
  .skel::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(0,0,0,.03), transparent); transform: translateX(-100%); animation: sh 1.2s infinite; }
  @keyframes sh { 100% { transform: translateX(100%); } }

  /* Admin */
  .admin-wrap { max-width: 760px; margin: 0 auto; }
  .admin-login { max-width: 380px; margin: 40px auto; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 28px 24px; text-align: center; }
  .admin-login svg { width: 40px; height: 40px; color: var(--accent); margin: 0 auto 12px; }
  .admin-row { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 11px; margin-bottom: 10px; }
  .admin-row .th { width: 48px; height: 48px; border-radius: 9px; overflow: hidden; background: var(--surface-2); display: grid; place-items: center; flex-shrink: 0; }
  .admin-row .th img { width: 100%; height: 100%; object-fit: cover; }
  .admin-row .th svg { width: 24px; height: 24px; opacity: .5; }
  .admin-row .meta { flex: 1; min-width: 0; }
  .admin-row .meta h4 { margin: 0; font-size: 14px; font-weight: 600; font-family: inherit; }
  .admin-row .meta p { margin: 1px 0 0; font-size: 12px; color: var(--ink-soft); }
  .admin-row .acts { display: flex; gap: 6px; }
  .admin-row .acts button { width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--line-dark); display: grid; place-items: center; color: var(--ink-soft); }
  .admin-row .acts button svg { width: 16px; height: 16px; }
  .admin-row .acts button.del:hover { border-color: var(--danger); color: var(--danger); }
  .admin-row.inactive { opacity: .55; }
  .pill-stat { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; padding: 2px 7px; border-radius: 12px; }
  .pill-stat.live { background: var(--accent-soft); color: var(--accent); }
  .pill-stat.hidden { background: #f0e9db; color: var(--ink-soft); }
  .pill-stat.oos { background: #f6e2df; color: var(--danger); }
  .admin-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 18px; }
  .stat-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; text-align: center; }
  .stat-card .n { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 600; }
  .stat-card .l { font-size: 11px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .5px; }

  @media (min-width: 720px) {
    .cat-grid { grid-template-columns: repeat(8, 1fr); }
    .prod-grid, .skel-grid { grid-template-columns: repeat(4, 1fr); }
    .age-grid { grid-template-columns: repeat(6, 1fr); }
    .pd-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; align-items: start; }
    .pd-info { margin-top: 0; }
    body { padding-bottom: 20px; }
    .bottom-nav { display: none; }
    .fabs { bottom: 24px; }
    .hero h2 { font-size: 40px; }
  }
</style>
</head>
<body>

<header class="top">
  <div class="top-inner">
    <div class="brand" onclick="go('home')">
      <div class="mark" id="brandMark"></div>
      <div class="tag">
        <h1>Rumaliwala</h1>
        <p>Rumali &amp; Islamic Accessories</p>
      </div>
    </div>
    <div class="search-wrap">
      <span class="si" id="searchIcon"></span>
      <input id="searchInput" type="search" placeholder="Search rumali, cap, age, colour..." oninput="onSearch(this.value)" />
    </div>
  </div>
</header>

<main id="app"></main>

<div class="fabs">
  <a class="fab wa" id="fabWa" title="WhatsApp"></a>
  <a class="fab call" id="fabCall" title="Call"></a>
</div>

<nav class="bottom-nav">
  <button id="navHome" onclick="go('home')" data-ic="home">Home</button>
  <button id="navCats" onclick="go('categories')" data-ic="grid">Categories</button>
  <button id="navWish" onclick="go('wishlist')" data-ic="heart">Wishlist</button>
  <button id="navCart" onclick="go('cart')" data-ic="cart">Cart<span class="nav-badge" id="navCartBadge" style="display:none">0</span></button>
</nav>

<div class="toast" id="toast"></div>

<script>
/* =========================================================
   CONFIG  -  Store owner: edit business details here
   ========================================================= */

function icon(name, cls){ return `<svg class="${cls||'icon'}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||''}</svg>`; }
function iconFill(name, cls){ return `<svg class="${cls||'icon'}" viewBox="0 0 24 24" fill="currentColor" stroke="none">${ICONS[name]||''}</svg>`; }

/* Islamic geometric pattern tile as a background data-URI */
function patternURI(stroke){
  const s = stroke.replace('#','%23');
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='44' height='44' viewBox='0 0 44 44'><g fill='none' stroke='${s}' stroke-width='1'><rect x='11' y='11' width='22' height='22'/><rect x='11' y='11' width='22' height='22' transform='rotate(45 22 22)'/></g></svg>`;
  return `url("data:image/svg+xml,${encodeURIComponent(svg)}")`;
}

function save(k,v){ localStorage.setItem(k, JSON.stringify(v)); }

/* =========================================================
   SUPABASE
   ========================================================= */
async function sbGet(){
  const r = await fetch(`${SB.url}/rest/v1/rw_products?select=*&order=sort_order.asc,created_at.asc`, {
    headers: { apikey: SB.key, Authorization: "Bearer "+SB.key }
  });
  if (!r.ok) throw new Error("fetch failed");
  return r.json();
}
async function sbRpc(fn, body){
  const r = await fetch(`${SB.url}/rest/v1/rpc/${fn}`, {
    method:"POST",
    headers:{ apikey:SB.key, Authorization:"Bearer "+SB.key, "Content-Type":"application/json" },
    body: JSON.stringify(body)
  });
  const text = await r.text();
  if (!r.ok) throw new Error(text || "request failed");
  try { return JSON.parse(text); } catch(e){ return text; }
}
function normalize(rows){
  return rows.map(r => ({
    id: r.id, cat: r.category, sub: r.subcategory||"", age: r.age||"",
    title: r.title, price: Number(r.price), mrp: Number(r.mrp)||0,
    fabric: r.fabric||"", colors: r.colors||[], image: r.image_url||"",
    badge: r.badge||"", stars: r.rating||5, stock: r.stock||0,
    featured: r.featured, active: r.active, desc: r.description||"",
    sort_order: r.sort_order||0,
  }));
}
async function loadProducts(){
  try {
    const rows = await sbGet();
    store.products = normalize(rows);
    store.loaded = true;
  } catch(e){
    store.products = SEED.map(s=>({ ...s, active:true, image:"", featured:s.badge==='best' }));
    store.loaded = true;
    toast("Offline mode - showing sample items");
  }
}

/* Product thumb: image if present, else geometric placeholder in product colour */
function thumbHTML(p, big){
  if (p.image) return `<img src="${p.image}" alt="${escapeHtml(p.title)}" loading="lazy" onerror="this.style.display='none'"/>`;
  const c = (p.colors && p.colors[0]) || "#14352c";
  const bg = `background-color:${c}0f; background-image:${patternURI(c)}; background-position:center;`;
  return `<div class="ph" style="${bg}; color:${c}">${icon(catIcon(p.cat), big?'':'')}</div>`;
}
function escapeHtml(s){ return String(s||"").replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

/* =========================================================
   CART / WISHLIST
   ========================================================= */
function cartCount(){ return store.cart.reduce((s,i)=>s+i.qty,0); }
function cartTotal(){ return store.cart.reduce((s,i)=>{ const p=byId(i.id); return s + (p?p.price*i.qty:0); },0); }
function addToCart(id, qty=1){
  const p = byId(id);
  if (!p || p.stock<=0){ toast("Out of stock"); return; }
  const ex = store.cart.find(i=>i.id===id);
  if (ex) ex.qty += qty; else store.cart.push({ id, qty });
  persist(); updateBadges(); toast(p.title+" added to cart");
}
function setQty(id, qty){ const it=store.cart.find(i=>i.id===id); if(!it)return; it.qty=qty; if(it.qty<=0) store.cart=store.cart.filter(i=>i.id!==id); persist(); updateBadges(); render(); }
function removeFromCart(id){ store.cart=store.cart.filter(i=>i.id!==id); persist(); updateBadges(); render(); }
function toggleWish(id){
  if (store.wishlist.includes(id)){ store.wishlist=store.wishlist.filter(x=>x!==id); toast("Removed from wishlist"); }
  else { store.wishlist.push(id); toast("Saved to wishlist"); }
  persist(); render();
}
const isWished = id => store.wishlist.includes(id);
function trackRecent(id){ store.recent=[id,...store.recent.filter(x=>x!==id)].slice(0,8); persist(); }

/* =========================================================
   NAV
   ========================================================= */
function go(view, opts={}){
  store.view = view;
  if (opts.cat!==undefined) store.filterCat=opts.cat;
  if (opts.sub!==undefined) store.filterSub=opts.sub;
  if (opts.age!==undefined) store.filterAge=opts.age;
  if (view==="home"){ store.filterCat=store.filterSub=store.filterAge=null; store.search=""; const si=document.getElementById("searchInput"); if(si) si.value=""; }
  if (view!=="admin" && location.hash==="#admin") history.replaceState(null,"",location.pathname);
  window.scrollTo(0,0); render();
}
function onSearch(v){
  store.search=v.trim().toLowerCase();
  if (store.search && store.view!=="search") store.view="search";
  if (!store.search && store.view==="search") store.view="home";
  render();
}
function matchesSearch(p){
  if (!store.search) return true;
  return [p.title,p.cat,p.sub,p.age,p.fabric,catName(p.cat),(p.colors||[]).join(" ")].join(" ").toLowerCase().includes(store.search);
}

const app = document.getElementById("app");
function render(){
  updateBadges();
  let html="";
  switch(store.view){
    case "home": html=viewHome(); break;
    case "categories": html=viewCategories(); break;
    case "category": html=viewCategory(); break;
    case "age": html=viewAge(); break;
    case "products": html=viewProducts(); break;
    case "detail": html=viewDetail(); break;
    case "cart": html=viewCart(); break;
    case "wishlist": html=viewWishlist(); break;
    case "search": html=viewSearch(); break;
    case "wholesale": html=viewWholesale(); break;
    case "admin": html=viewAdmin(); break;
    default: html=viewHome();
  }
  app.innerHTML=html;
}

  <div class="prod-card">
    <div class="prod-thumb" onclick="openDetail('${p.id}')">

/* ---------- AGE ---------- */
function openSub(catId, sub){
  const rel = shopProducts().filter(p=>p.cat===catId && p.sub===sub);
  const ageSet = [...new Set(rel.map(p=>p.age).filter(Boolean))];
  const kidAges = ageSet.filter(a=>/year/i.test(a) && !/12\+/.test(a));
  if (kidAges.length>1) go("age",{cat:catId,sub,age:null});
  else go("products",{cat:catId,sub,age:null});
}
function viewAge(){
  const isWomen=/women/i.test(store.filterSub||"");
  const list = isWomen ? AGE_ADULT : AGE_KIDS.concat(["Adult Free Size"]);
  return `<div class="back-bar"><a class="back-btn" onclick="go('category',{cat:'${store.filterCat}'})">${icon('back')} ${catName(store.filterCat)}</a></div>
    <div class="page-h">${escapeHtml(store.filterSub||catName(store.filterCat))}</div>
    <div class="page-sub">Select age / size</div>
    <div class="age-grid">
      ${list.map(a=>`<div class="age-card" onclick="go('products',{cat:'${store.filterCat}',sub:${JSON.stringify(store.filterSub||'')},age:${JSON.stringify(a)}})">${a.replace(' Years','')}<small>${/year/i.test(a)?'Years':''}</small></div>`).join("")}
    </div>

}

/* ---------- PRODUCTS ---------- */
function filteredProducts(){
  let list = shopProducts().filter(p=>{
    if (store.filterCat && p.cat!==store.filterCat) return false;
    if (store.filterSub && p.sub!==store.filterSub) return false;
    if (store.filterAge && p.age!==store.filterAge) return false;
    return true;
  });
  switch(store.sort){
    case "low": list.sort((a,b)=>a.price-b.price); break;
    case "high": list.sort((a,b)=>b.price-a.price); break;
    case "new": list.sort((a,b)=>(b.badge==='new')-(a.badge==='new')); break;
    case "popular": list.sort((a,b)=>b.stars-a.stars); break;
  }
  return list;
}
function viewProducts(){
  const list = filteredProducts();
  const backTo = subsFor(store.filterCat).length ? `go('category',{cat:'${store.filterCat}'})` : "go('home')";
  const crumb = [catName(store.filterCat), store.filterSub, store.filterAge].filter(Boolean).join(" · ");
  return `<div class="back-bar"><a class="back-btn" onclick="${backTo}">${icon('back')} Back</a></div>
    <div class="page-h">${catName(store.filterCat)}</div>
    <div class="page-sub">${crumb||'All products'} · ${list.length} item${list.length!==1?'s':''}</div>
    <div class="chips">
      ${['featured:Featured','low:Price low','high:Price high','new:Newest','popular:Popular'].map(o=>{const[v,l]=o.split(':');return `<div class="chip ${store.sort===v?'active':''}" onclick="setSort('${v}')">${l}</div>`;}).join("")}
    </div>
    ${list.length?`<div class="prod-grid">${list.map(productCard).join("")}</div>`:`<div class="empty">${icon('search','')}No products in this selection yet.</div>`}`;
}
function setSort(s){ store.sort=s; render(); }

/* ---------- DETAIL ---------- */
let pdQty=1, pdColor=0;
function openDetail(id){ trackRecent(id); pdQty=1; pdColor=0; store._detailId=id; go("detail"); }
function viewDetail(){
  const p = byId(store._detailId);
  if (!p) return viewHome();
  const oos = p.stock<=0;
  return `<div class="back-bar"><a class="back-btn" onclick="go('products',{cat:'${p.cat}'})">${icon('back')} ${catName(p.cat)}</a></div>
    <div class="pd-wrap">
      <div class="pd-gallery"><div class="pd-main">${thumbHTML(p,true)}</div></div>
      <div class="pd-info">
        ${p.badge==='best'?'<span class="badge best" style="display:inline-block;margin-bottom:10px">Bestseller</span>':''}
        ${p.badge==='new'?'<span class="badge new" style="display:inline-block;margin-bottom:10px">New Arrival</span>':''}
        <div class="pd-cat">${catName(p.cat)}</div>
        <h2>${escapeHtml(p.title)}</h2>
        <div class="prod-stars" style="font-size:14px">${stars(p.stars)} <span style="color:var(--ink-soft);font-size:12px">(${p.stars}.0)</span></div>
        <div class="prod-price-row" style="margin-top:10px">
          <span class="prod-price" style="font-size:25px">${money(p.price)}</span>
          ${p.mrp>p.price?`<span class="prod-mrp" style="font-size:15px">${money(p.mrp)}</span><span class="badge off">${Math.round((1-p.price/p.mrp)*100)}% off</span>`:''}
        </div>
        <div class="pd-specs">
          <div class="row"><span>Category</span><span>${catName(p.cat)}</span></div>
          ${p.sub?`<div class="row"><span>Type</span><span>${escapeHtml(p.sub)}</span></div>`:''}
          ${p.age?`<div class="row"><span>Age / Size</span><span>${p.age}</span></div>`:''}
          ${p.fabric?`<div class="row"><span>Fabric</span><span>${escapeHtml(p.fabric)}</span></div>`:''}
          <div class="row"><span>Availability</span><span style="color:${oos?'var(--danger)':'var(--accent-2)'};font-weight:600">${oos?'Out of stock':'In stock'}</span></div>
        </div>
        ${(p.colors&&p.colors.length)?`<div style="font-size:13px;color:var(--ink-soft);margin-bottom:8px">Available colours</div>
        <div class="colors">${p.colors.map((c,i)=>`<div class="color-dot" style="background:${c};${i===pdColor?'border-color:var(--accent)':''}" onclick="pdColor=${i};render()"></div>`).join("")}</div>`:''}
        <p style="font-size:14px;color:var(--ink-soft);margin:16px 0">${escapeHtml(p.desc)}</p>
        ${oos?`<button class="btn-primary" onclick="notifyMe('${p.id}')">${icon('bell')} Notify me when available</button>`
          :`<div class="qty-row"><span style="font-weight:600;font-size:14px">Quantity</span>
            <div class="qty-ctrl"><button onclick="pdQty=Math.max(1,pdQty-1);render()">−</button><span>${pdQty}</span><button onclick="pdQty++;render()">+</button></div></div>
            <button class="btn-primary" onclick="addToCart('${p.id}',${pdQty})">${icon('cart')} Add ${pdQty} to Cart</button>`}
        <div style="height:10px"></div>
        <button class="btn-outline" onclick="shareProduct('${p.id}')">${icon('share')} Share Product</button>
      </div>
    </div>`;
}

/* ---------- CART ---------- */
function viewCart(){
  if (!store.cart.length) return `<div class="back-bar"><a class="back-btn" onclick="go('home')">${icon('back')} Continue Shopping</a></div>
    <div class="empty">${icon('cart','')}Your cart is empty.<br/><br/><button class="btn-primary" style="max-width:240px;margin:0 auto" onclick="go('categories')">Browse Products</button></div>`;
  const total = cartTotal();
  return `<div class="back-bar"><a class="back-btn" onclick="go('home')">${icon('back')} Continue Shopping</a></div>
    <div class="page-h">Your Cart</div><div class="page-sub">${cartCount()} item${cartCount()!==1?'s':''}</div>
    ${store.cart.map(item=>{ const p=byId(item.id); if(!p) return ''; return `
      <div class="cart-item">
        <div class="cart-thumb">${thumbHTML(p)}</div>
        <div class="cart-info"><h4>${escapeHtml(p.title)}</h4><div class="m">${[p.age,p.sub].filter(Boolean).join(' · ')}</div>
          <div class="cart-qc"><div class="qty-ctrl"><button onclick="setQty('${p.id}',${item.qty-1})">−</button><span>${item.qty}</span><button onclick="setQty('${p.id}',${item.qty+1})">+</button></div>
          <button class="cart-remove" onclick="removeFromCart('${p.id}')">Remove</button></div>
        </div>
        <div class="cart-line-price">${money(p.price*item.qty)}</div>
      </div>`; }).join("")}
    <div class="summary">
      <div class="row"><span>Subtotal</span><span>${money(total)}</span></div>
      <div class="row"><span>Delivery</span><span style="color:var(--ink-soft)">Confirmed on WhatsApp</span></div>
      <div class="row total"><span>Total</span><span>${money(total)}</span></div>
    </div>
    <div class="page-h" style="font-size:20px">Delivery Details</div>
    <div class="form-grid">
      <div class="field full"><label>Full Name *</label><input id="f_name" placeholder="Your name"/></div>
      <div class="field full"><label>Mobile Number *</label><input id="f_phone" type="tel" inputmode="numeric" placeholder="10-digit mobile"/></div>
      <div class="field full"><label>Address *</label><textarea id="f_addr" rows="2" placeholder="House / street / area"></textarea></div>
      <div class="field"><label>City</label><input id="f_city" value="${CONFIG.city}"/></div>
      <div class="field"><label>PIN Code</label><input id="f_pin" inputmode="numeric" placeholder="380001"/></div>
      <div class="field full"><label>Remarks (optional)</label><input id="f_note" placeholder="Colour preference, delivery time, etc."/></div>
    </div>
    <div style="height:8px"></div>
    <button class="btn-primary btn-wa" onclick="placeOrder()">${icon('whatsapp')} Place Order on WhatsApp</button>
    <div style="font-size:12px;color:var(--ink-soft);text-align:center;margin:10px 0 20px">No online payment. Your order opens in WhatsApp for confirmation.</div>`;
}
function placeOrder(){
  const g=id=>(document.getElementById(id)||{}).value||"";
  const name=g("f_name").trim(), phone=g("f_phone").trim(), addr=g("f_addr").trim(), city=g("f_city").trim(), pin=g("f_pin").trim(), note=g("f_note").trim();
  let ok=true;
  [["f_name",name],["f_phone",phone],["f_addr",addr]].forEach(([id,v])=>{ const el=document.getElementById(id); if(!v){el.classList.add("err");ok=false;} else el.classList.remove("err"); });
  if(!ok){ toast("Please fill name, mobile and address"); return; }
  if(!/^\d{10}$/.test(phone.replace(/\D/g,'').slice(-10))){ document.getElementById("f_phone").classList.add("err"); toast("Enter a valid 10-digit mobile"); return; }
  const total=cartTotal();
  let msg=`Assalamualaikum.\nI would like to place an order.\n\nCustomer Name: ${name}\nMobile: ${phone}\n\nProducts\n`;
  store.cart.forEach((it,i)=>{ const p=byId(it.id); if(!p)return; msg+=`${i+1}. ${p.title}\n`; if(p.age) msg+=`   Size: ${p.age}\n`; msg+=`   Qty: ${it.qty}\n   Price: ${money(p.price)}  (Line: ${money(p.price*it.qty)})\n`; });
  msg+=`\nTotal: ${money(total)}\n\nDelivery Address\n${addr}\n${city}${pin?` - ${pin}`:''}\n`;
  if(note) msg+=`\nRemarks: ${note}\n`;
  msg+=`\nPlease confirm availability and delivery.\nThank you.`;
  window.open(`https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(msg)}`,"_blank");
  toast("Opening WhatsApp...");
}

/* ---------- WISHLIST ---------- */

    ${list.length?`<div class="prod-grid">${list.map(productCard).join("")}</div>`:`<div class="empty">${icon('heart','')}No saved products yet.<br/>Tap the heart on any product to save it.</div>`}`;
}

/* ---------- SEARCH ---------- */
function viewSearch(){
  const list=shopProducts().filter(matchesSearch);
  return `<div class="back-bar"><a class="back-btn" onclick="go('home')">${icon('back')} Home</a></div>

/* ---------- WHOLESALE ---------- */

    <div class="wholesale-hero"><div class="pattern" style="background-image:${patternURI('#f4efe4')}"></div>
      <h2>Become a Wholesale Partner</h2><p>Shop owners and resellers: get bulk pricing on rumali, caps, namazi and accessories.</p></div>
    <div class="form-grid">
      <div class="field full"><label>Your Name *</label><input id="w_name" placeholder="Full name"/></div>
      <div class="field"><label>Shop Name</label><input id="w_shop" placeholder="Shop / firm"/></div>
      <div class="field"><label>City *</label><input id="w_city" placeholder="City"/></div>
      <div class="field full"><label>Phone *</label><input id="w_phone" type="tel" inputmode="numeric" placeholder="10-digit mobile"/></div>
      <div class="field full"><label>Business Type</label><select id="w_type"><option>Retail Shop</option><option>Wholesaler</option><option>Online Reseller</option><option>Boutique</option><option>Other</option></select></div>
      <div class="field full"><label>Expected Monthly Requirement</label><input id="w_qty" placeholder="e.g. 500 pieces"/></div>

    </div>
    <div style="height:8px"></div>
    <button class="btn-primary btn-wa" onclick="wholesaleInquiry()">${icon('whatsapp')} Send Inquiry on WhatsApp</button>
    <div style="height:10px"></div>
    <button class="btn-outline" onclick="wholesaleEmail()">Send by Email</button>
    <div style="height:24px"></div>`;
}
function wholesaleMsg(){
  const g=id=>(document.getElementById(id)||{}).value||"";
  const name=g("w_name").trim(),shop=g("w_shop").trim(),city=g("w_city").trim(),phone=g("w_phone").trim(),type=g("w_type"),qty=g("w_qty").trim(),m=g("w_msg").trim();

  return `Assalamualaikum.\nWholesale Partnership Inquiry\n\nName: ${name}\nShop: ${shop||'-'}\nCity: ${city}\nPhone: ${phone}\nBusiness Type: ${type}\nMonthly Requirement: ${qty||'-'}\n\nMessage:\n${m||'-'}\n\nThank you.`;

function wholesaleInquiry(){ const m=wholesaleMsg(); if(!m)return; window.open(`https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(m)}`,"_blank"); toast("Opening WhatsApp..."); }
function wholesaleEmail(){ const m=wholesaleMsg(); if(!m)return; window.location.href=`mailto:?subject=${encodeURIComponent('Wholesale Inquiry - '+CONFIG.businessName)}&body=${encodeURIComponent(m)}`; }

/* ---------- MISC ---------- */
function notifyMe(id){ const p=byId(id); const m=`Assalamualaikum.\nPlease notify me when this is back in stock:\n\n${p.title}${p.age?` (${p.age})`:''}\n\nThank you.`; window.open(`https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(m)}`,"_blank"); }
function shareProduct(id){ const p=byId(id); const text=`${p.title} - ${money(p.price)}\n${p.desc||''}\n\nOrder at ${CONFIG.businessName}`; if(navigator.share){ navigator.share({title:p.title,text}).catch(()=>{}); } else { window.open(`https://wa.me/?text=${encodeURIComponent(text)}`,"_blank"); } }

/* =========================================================
   ADMIN
   ========================================================= */
function openAdmin(){ store.view="admin"; store.admin.editing=null; location.hash="#admin"; window.scrollTo(0,0); render(); }
function viewAdmin(){
  if (!store.admin.pass) return adminLogin();
  const all = [...store.products];
  const live = all.filter(p=>p.active).length;
  const oos = all.filter(p=>p.stock<=0).length;
  return `<div class="admin-wrap">
    <div class="back-bar" style="justify-content:space-between">
      <a class="back-btn" onclick="go('home')">${icon('back')} Back to Store</a>
      <button class="back-btn" onclick="adminLogout()">${icon('lock')} Lock</button>
    </div>
    <div class="page-h">Store Admin</div>
    <div class="page-sub">Add, edit or remove products. Changes go live for all customers instantly.</div>
    <div class="admin-stats">
      <div class="stat-card"><div class="n">${all.length}</div><div class="l">Products</div></div>
      <div class="stat-card"><div class="n">${live}</div><div class="l">Live</div></div>
      <div class="stat-card"><div class="n">${oos}</div><div class="l">Out of Stock</div></div>
    </div>
    <button class="btn-primary" onclick="adminForm(null)">${icon('plus')} Add New Product</button>
    <div style="height:18px"></div>
    <div class="page-h" style="font-size:18px">All Products</div>
    <div style="height:8px"></div>
    ${all.map(adminRow).join("")}
    <div style="height:30px"></div>
  </div>`;
}
function adminRow(p){
  const stat = p.stock<=0 ? '<span class="pill-stat oos">Out of stock</span>' : (p.active?'<span class="pill-stat live">Live</span>':'<span class="pill-stat hidden">Hidden</span>');
  return `<div class="admin-row ${p.active?'':'inactive'}">
    <div class="th">${thumbHTML(p)}</div>
    <div class="meta"><h4>${escapeHtml(p.title)}</h4><p>${catName(p.cat)}${p.age?' · '+p.age:''} · ${money(p.price)} · stock ${p.stock} ${stat}</p></div>
    <div class="acts">
      <button title="Edit" onclick='adminForm(${JSON.stringify(p.id)})'>${icon('grid')}</button>
      <button class="del" title="Delete" onclick='adminDelete(${JSON.stringify(p.id)},${JSON.stringify(p.title)})'>${icon('trash')}</button>
    </div>
  </div>`;
}
function adminLogin(){
  return `<div class="admin-login">
    ${icon('lock','')}
    <h2 style="margin:0 0 4px;font-size:22px">Store Admin</h2>
    <p style="color:var(--ink-soft);font-size:13px;margin:0 0 18px">Enter the store passcode to manage products.</p>
    <div class="field" style="text-align:left"><label>Passcode</label><input id="adm_pass" type="password" placeholder="Passcode" onkeydown="if(event.key==='Enter')adminVerify()"/></div>
    <div style="height:12px"></div>
    <button class="btn-primary" onclick="adminVerify()">Unlock</button>
    <div style="height:10px"></div>
    <button class="btn-outline btn-sm" style="width:100%" onclick="go('home')">Back to Store</button>
  </div>`;
}
async function adminVerify(){
  const pass=(document.getElementById("adm_pass")||{}).value||"";
  if(!pass) return;
  try{
    const okv = await sbRpc("rw_check_pass",{ p_passcode: pass });
    if(okv===true){ store.admin.pass=pass; sessionStorage.setItem("rw_pass",pass); toast("Welcome"); render(); }
    else toast("Wrong passcode");
  }catch(e){ toast("Could not verify - check connection"); }
}
function adminLogout(){ store.admin.pass=null; sessionStorage.removeItem("rw_pass"); go("home"); }

function adminForm(id){
  const p = id ? byId(id) : { cat:"rumali", sub:"", age:"", title:"", price:"", mrp:"", fabric:"", colors:[], image:"", badge:"", stars:5, stock:10, desc:"", active:true };
  store.admin.editing = id;
  const opt=(v,l,cur)=>`<option value="${v}" ${cur===v?'selected':''}>${l}</option>`;
  const ageOpts=["",...AGE_KIDS,...AGE_ADULT].map(a=>opt(a,a||'(none)',p.age)).join("");
  app.innerHTML = `<div class="admin-wrap">
    <div class="back-bar"><a class="back-btn" onclick="openAdmin()">${icon('back')} Admin</a></div>
    <div class="page-h">${id?'Edit Product':'Add Product'}</div>
    <div class="form-grid">
      <div class="field full"><label>Title *</label><input id="a_title" value="${escapeHtml(p.title)}" placeholder="e.g. Diamond Net Rumali"/></div>
      <div class="field"><label>Category *</label><select id="a_cat">${CATEGORIES.filter(c=>c.id!=='wholesale').map(c=>opt(c.id,c.name,p.cat)).join("")}</select></div>
      <div class="field"><label>Sub-type</label><input id="a_sub" value="${escapeHtml(p.sub)}" placeholder="e.g. Diamond Rumali"/></div>
      <div class="field"><label>Age / Size</label><select id="a_age">${ageOpts}</select></div>
      <div class="field"><label>Fabric</label><input id="a_fabric" value="${escapeHtml(p.fabric)}" placeholder="e.g. Soft Cotton"/></div>
      <div class="field"><label>Price (₹) *</label><input id="a_price" type="number" inputmode="numeric" value="${p.price}" placeholder="120"/></div>
      <div class="field"><label>MRP (₹)</label><input id="a_mrp" type="number" inputmode="numeric" value="${p.mrp}" placeholder="150"/></div>
      <div class="field"><label>Stock</label><input id="a_stock" type="number" inputmode="numeric" value="${p.stock}" placeholder="10"/></div>
      <div class="field"><label>Badge</label><select id="a_badge">${opt('','None',p.badge)}${opt('new','New',p.badge)}${opt('best','Bestseller',p.badge)}</select></div>
      <div class="field full"><label>Colours (comma-separated hex, e.g. #14352c, #7b241c)</label><input id="a_colors" value="${(p.colors||[]).join(', ')}" placeholder="#14352c, #7b241c"/></div>
      <div class="field full"><label>Image URL (optional)</label><input id="a_image" value="${escapeHtml(p.image)}" placeholder="https://..."/></div>
      <div class="field full"><label>Description</label><textarea id="a_desc" rows="3" placeholder="Short product description">${escapeHtml(p.desc)}</textarea></div>
      <div class="field full"><label class="cb"><input id="a_active" type="checkbox" ${p.active?'checked':''} style="width:auto"/> Visible in store</label></div>
    </div>
    <div style="height:10px"></div>
    <button class="btn-primary" id="a_save" onclick="adminSave()">${icon('check')} ${id?'Save Changes':'Add Product'}</button>
    <div style="height:10px"></div>
    <button class="btn-outline" onclick="openAdmin()">Cancel</button>
    <div style="height:30px"></div>
  </div>`;
  window.scrollTo(0,0);
}
async function adminSave(){
  const g=id=>(document.getElementById(id)||{}).value;
  const title=g("a_title").trim(), price=g("a_price");
  if(!title){ document.getElementById("a_title").classList.add("err"); toast("Title is required"); return; }
  if(price===""||isNaN(+price)){ document.getElementById("a_price").classList.add("err"); toast("Valid price required"); return; }
  const colors = g("a_colors").split(",").map(s=>s.trim()).filter(Boolean);
  const data = {
    category:g("a_cat"), subcategory:g("a_sub").trim(), age:g("a_age"),
    title, description:g("a_desc").trim(), price:+price, mrp:+(g("a_mrp")||0),
    fabric:g("a_fabric").trim(), colors, image_url:g("a_image").trim(),
    badge:g("a_badge"), stock:+(g("a_stock")||0),
    active: document.getElementById("a_active").checked,
  };
  const btn=document.getElementById("a_save"); btn.disabled=true; btn.textContent="Saving...";
  try{
    if(store.admin.editing) await sbRpc("rw_update_product",{ p_passcode:store.admin.pass, p_id:store.admin.editing, p:data });
    else await sbRpc("rw_add_product",{ p_passcode:store.admin.pass, p:data });
    await loadProducts();
    toast(store.admin.editing?"Product updated":"Product added");
    openAdmin();
  }catch(e){
    btn.disabled=false; btn.textContent="Save";
    toast(/unauthorized/i.test(e.message)?"Session expired - unlock again":"Save failed - try again");
    if(/unauthorized/i.test(e.message)){ store.admin.pass=null; sessionStorage.removeItem("rw_pass"); render(); }
  }
}
async function adminDelete(id, title){
  if(!confirm(`Delete "${title}"? This cannot be undone.`)) return;
  try{
    await sbRpc("rw_delete_product",{ p_passcode:store.admin.pass, p_id:id });
    await loadProducts(); toast("Product deleted"); render();
  }catch(e){ toast(/unauthorized/i.test(e.message)?"Session expired - unlock again":"Delete failed"); }
}

/* =========================================================
   BADGES / INIT
   ========================================================= */
function updateBadges(){
  const c=cartCount(); const nb=document.getElementById("navCartBadge");
  if(nb){ nb.style.display=c?'grid':'none'; nb.textContent=c; }
  ["Home","Cats","Wish","Cart"].forEach(n=>{ const el=document.getElementById("nav"+n); if(el)el.classList.remove("active"); });
  const map={home:"Home",categories:"Cats",wishlist:"Wish",cart:"Cart"};
  const a=map[store.view]; if(a){ const el=document.getElementById("nav"+a); if(el)el.classList.add("active"); }
}
function paintChrome(){
  document.getElementById("brandMark").innerHTML=icon('moon');
  document.getElementById("searchIcon").innerHTML=icon('search');
  document.querySelectorAll(".bottom-nav button[data-ic]").forEach(b=>{ b.insertAdjacentHTML("afterbegin", icon(b.dataset.ic)); });
  const wa=document.getElementById("fabWa"); wa.innerHTML=icon('whatsapp'); wa.href=`https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent('Assalamualaikum, I have a question about your products.')}`; wa.target="_blank";
  const call=document.getElementById("fabCall"); call.innerHTML=icon('phone'); call.href=`tel:+${CONFIG.callNumber}`;
}
async function init(){
  paintChrome();
  if(location.hash==="#admin") store.view="admin";
  render();                 // show skeleton
  await loadProducts();
  render();                 // real content
}
init();
</script>
